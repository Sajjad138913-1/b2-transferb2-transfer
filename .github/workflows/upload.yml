name: Test B2 Keys

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug keys
        run: |
          echo "KEY ID exists: ${{ secrets.B2_KEY_ID != '' }}"
          echo "APP KEY exists: ${{ secrets.B2_APPLICATION_KEY != '' }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install b2sdk
        run: pip install b2sdk

      - name: Test login
        env:
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: python upload.py
